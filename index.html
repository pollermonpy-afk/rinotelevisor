  {name:"Dra. Elen de Masi",      photo:"elen-de-masi.png",      role:"Disertante",            specialty:"Cirugía Plástica Facial · Oculoplastia",        country:"Brasil",   talk:"",                                                    ig:"draelendemasi"},

  {name:"Dr. Miguel Cupito",      photo:"miguel-cupito.png",     role:"Disertante",            specialty:"Cirugía Plástica Facial",                       country:"Argentina",talk:"",                                                    ig:"dr.miguelcupito_rinoplastia"},
  {name:"Dr. Paolo Pegoraro",     photo:"paolo-pegoraro.png",    role:"Disertante",            specialty:"Cirugía Plástica Facial",                       country:"Argentina",talk:"",                                                    ig:"dr.paolo.pegoraro"},
  {name:"Dr. Rodolfo Toledo",     photo:"rodolfo-toledo.png",    role:"Disertante",            specialty:"Cirugía Plástica Facial · Rejuvenecimiento",    country:"Brasil",   talk:"",                                                    ig:"drrodolfotoledo"},
  {name:"Dr. Sergio De Paoli",    photo:"sergio-de-paoli.png",   role:"Disertante",            specialty:"Cirugía Plástica Facial",                       country:"Brasil",   talk:"",                                                    ig:"drsergiodepaoli.cirurgiao"},

const agenda=[

  {time:"09:00",label:"Apertura · Palabras de bienvenida — Dr. Héctor Céspedes & Dr. Raúl Samaniego"},

  {time:"10:00",label:"🔴 Cirugías en vivo — Rinoplastia Primaria — L. Chinski · G. Coelho"},
  {time:"",     label:"Moderador: Dr. Cristian Barbón"},
  {time:"13:00",label:"Conferencia — Rinoplastia, Arte y Belleza — Santiago Herrera"},
  {time:"13:20",label:"Conferencia — Manejo del pilar central — Cristian Barbón"},
  {time:"13:40",label:"Conferencia — Cephalic flap · Crus lateral y posición domal — Heloisa Koerner"},
  {time:"14:00",label:"🍽️  Almuerzo"},
  {time:"15:00",label:"Mi filosofía en Rinoplastia Secundaria — Leila Freire · Roberto Ferrero"},
  {time:"15:40",label:"🔴 Cirugías en vivo — Rinoplastia Secundaria — L. Freire · R. Ferrero"},
  {time:"",     label:"Moderador: Dr. Cristian Barbón"},
  {time:"18:00",label:"Conferencia — Tercio superior y medio nasal — Cristian Simons"},
  {time:"18:20",label:"Conferencia — Punta nasal en rinoplastia secundaria — Walter Humpola"},
  {time:"18:40",label:"Conferencia — Injertos que definen la punta nasal — Claudia Ciuffi"},
  {time:"19:00",label:"Conferencia — Infecciones en Rinoplastia — Heloisa Koerner"},
  {time:"19:20",label:"Comentarios finales de los casos operados"},
  {time:"",     label:"L. Chinski (+ Expansión columelar) · G. Coelho (+ Nasal Tip Skin Fit)"},
  {time:"",     label:"L. Freire (+ base alar) · R. Ferrero (+ manto gel de fibrina)"},
  {time:"21:00",label:"🎶  Cena y Concierto — Juanchi Álvarez (saxo y violín)"},
];

const agendaDia2=[
  {time:"08:00",label:"Mi filosofía en Rejuvenecimiento Facial — P. García (Deep Plane) · R. Sanches (Frontoplastia)"},
  {time:"10:00",label:"🔴 Cirugías en vivo — Deep Plane — P. García · R. Sánchez"},
  {time:"10:10",label:"Conferencia — Huesos nasales (M. Cupito) · Tratamiento papada (L. Freire)"},
  {time:"",     label:"Conferencia — Reducción frente (V. Cruz) · Front Handle (N. Reis) · Tercio medio (J. Trujillo)"},
  {time:"13:00",label:"🍽️  Almuerzo"},
  {time:"14:30",label:"Conferencia — Mentoplastia e implantes (R. Toledo) · Lifting tercio medio (E. de Masi)"},
  {time:"",     label:"Conferencia — Contorno facial Mastoid Crevasse (G. Coelho)"},
  {time:"16:00",label:"Mi filosofía en Rejuvenecimiento Facial — Reposicionamiento y Frontoplastia"},
  {time:"",     label:"N. Reis · J. Trujillo · V. Cruz · C. Simons · S. De Paoli"},
  {time:"16:30",label:"🔴 Cirugías en Rejuvenecimiento Facial — Casos 1 y 2 (Moderador: R. Toledo)"},
  {time:"19:00",label:"Comentarios finales de los casos operados"},
  {time:"",     label:"P. García (+ glándula submaxilar) · R. Sánchez (+ prevención orejas duende)"},
  {time:"",     label:"N. Reis (+ Rejuve Lip) · V. Cruz (+ feminización) · J. Trujillo (+ Deep Plane modificado)"},
];

const slidesEl=document.getElementById('slides');
const bar=document.getElementById('progressBar');
const counter=document.getElementById('counter');
const DURATION=6000;
let current=0,rafId=null,startTime=null;

// Doctor slides
doctors.forEach((d,i)=>{
  const div=document.createElement('div');
  div.className='slide'+(i===0?' active':'');
  const flagSrc=flagMap[d.country]||'';
  div.innerHTML=`<div class="card">
    <div class="photo-col"><div class="circle-outer"><div class="ring-dot"></div><div class="circle-inner"><img src="fotos/${d.photo}" alt="${d.name}"/></div></div></div>
    <div class="info-col">
      <div class="line-top"></div>
      <span class="role-badge${d.role==='Director'?' director':''}">${d.role}</span>
      <h2 class="doctor-name">${d.name.replace(' ','<br>')}</h2>
      <p class="specialty">${d.specialty}</p>
      <div class="country-row">${flagSrc?`<img class="flag-img" src="${flagSrc}" alt="${d.country}"/>`:''}
        <span class="country-name">${d.country}</span></div>
      ${d.talk?`<p class="talk">${d.talk}</p>`:''}
      ${d.ig?`<p class="instagram"><span class="ig-at">@</span>${d.ig}</p>`:''}
      <div class="line-bot"></div>
    </div></div>`;
  slidesEl.appendChild(div);
});

// Agenda slide Día 1
const rows=agenda.map(a=>`<div class="agenda-row"><span class="agenda-time">${a.time}</span><span class="agenda-label">${a.label}</span></div>`).join('');
const agDiv=document.createElement('div');
agDiv.className='slide agenda-slide';
agDiv.innerHTML=`<div class="agenda-wrap">
  <div><p class="agenda-day-tag">DÍA 1 · JUEVES 14 DE MAYO 2026</p><h2 class="agenda-title">Programa · Rinoplastia</h2></div>
  <div class="agenda-ticker-outer"><div class="agTicker"><div class="agenda-inner">${rows}${rows}</div></div></div>
</div>`;
slidesEl.appendChild(agDiv);

// Agenda slide Día 2
const rows2=agendaDia2.map(a=>`<div class="agenda-row"><span class="agenda-time">${a.time}</span><span class="agenda-label">${a.label}</span></div>`).join('');
const agDiv2=document.createElement('div');
agDiv2.className='slide agenda-slide';
agDiv2.innerHTML=`<div class="agenda-wrap">
  <div><p class="agenda-day-tag">DÍA 2 · VIERNES 15 DE MAYO 2026</p><h2 class="agenda-title">Programa · Rejuvenecimiento Facial</h2></div>
  <div class="agenda-ticker-outer"><div class="agTicker"><div class="agenda-inner">${rows2}${rows2}</div></div></div>
</div>`;
slidesEl.appendChild(agDiv2);

const slides=document.querySelectorAll('.slide');
const TOTAL=slides.length;
counter.textContent='1 / '+TOTAL;

// Particles
const pEl=document.getElementById('particles');
for(let i=0;i<22;i++){
  const p=document.createElement('div');p.className='particle';
  const s=Math.random()*55+10;
  p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${Math.random()*18+10}s;animation-delay:${Math.random()*-25}s`;
  pEl.appendChild(p);
}

// Agenda ticker
let agPos=0,agRaf=null,agRunning=false;
function runTicker(){
  if(agRunning)return;agRunning=true;
  const inner=document.querySelector('.slide.active .agenda-inner');
  if(!inner)return;
  const half=inner.scrollHeight/2;
  (function tick(){agRaf=requestAnimationFrame(tick);agPos+=0.5;if(agPos>=half)agPos=0;inner.style.transform=`translateY(-${agPos}px)`})();
}
function stopTicker(){agRunning=false;cancelAnimationFrame(agRaf);agPos=0;}

function animateProg(dur,cb){
  cancelAnimationFrame(rafId);startTime=performance.now();
  bar.style.transition='none';bar.style.width='0%';
  requestAnimationFrame(()=>requestAnimationFrame(function t(now){
    const p=Math.min(((now-startTime)/dur)*100,100);
    bar.style.width=p+'%';
    if(p<100)rafId=requestAnimationFrame(t);else setTimeout(cb,50);
  }));
}

function showSlide(idx){
  slides[current].classList.remove('active');
  current=((idx%TOTAL)+TOTAL)%TOTAL;
  slides[current].classList.add('active');
  counter.textContent=(current+1)+' / '+TOTAL;
  if(slides[current].classList.contains('agenda-slide')){
    runTicker();animateProg(20000,()=>showSlide(current+1));
  } else {
    stopTicker();animateProg(DURATION,()=>showSlide(current+1));
  }
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){cancelAnimationFrame(rafId);showSlide(current+1);}
  if(e.key==='ArrowLeft'){cancelAnimationFrame(rafId);showSlide(current-1);}
  if(e.key==='f'||e.key==='F')document.documentElement.requestFullscreen?.();
});

animateProg(DURATION,()=>showSlide(1));



</script>
