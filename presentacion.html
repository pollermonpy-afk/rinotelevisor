<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --gold: #C9A84C;
      --gold2: #E8C97A;
      --gold3: #F5E0A0;
      --dark: #04080F;
      --white: #FAFAFA;
      --muted: rgba(255, 255, 255, 0.45);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--dark);
      font-family: 'Inter', sans-serif
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: radial-gradient(ellipse 90% 70% at 50% 50%, #0D1F3C 0%, #04080F 70%)
    }

    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(201, 168, 76, .035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201, 168, 76, .035) 1px, transparent 1px);
      background-size: 70px 70px
    }

    .top-line {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      z-index: 200;
      background: linear-gradient(90deg, transparent, var(--gold) 30%, var(--gold3) 50%, var(--gold) 70%, transparent);
      animation: shimmer 4s ease-in-out infinite
    }

    @keyframes shimmer {

      0%,
      100% {
        opacity: .7
      }

      50% {
        opacity: 1
      }
    }

    /* HEADER */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 52px 0
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 12px
    }

    .logo-wrap img {
      height: 58px;
      width: auto;
      filter: drop-shadow(0 0 16px rgba(201, 168, 76, .35))
    }

    .logo-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold), var(--gold3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: .1em
    }

    .logo-sub {
      font-size: .52rem;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 2px
    }

    .event-meta {
      text-align: right
    }

    .event-dates {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 600;
      background: linear-gradient(135deg, var(--gold), var(--gold3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: .08em
    }

    .event-place {
      font-size: .55rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 3px
    }

    /* BOTTOM BAR */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: 56px;
      background: rgba(4, 8, 15, .92);
      border-top: 1px solid rgba(201, 168, 76, .18);
      backdrop-filter: blur(14px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 36px;
      padding: 0 52px
    }

    .event-tag {
      font-size: .58rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: rgba(201, 168, 76, .65);
      white-space: nowrap
    }

    .progress-track {
      flex: 1;
      max-width: 360px;
      height: 2px;
      background: rgba(255, 255, 255, .07);
      border-radius: 2px;
      overflow: hidden
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold3));
      border-radius: 2px;
      width: 0%
    }

    .slide-counter {
      font-size: .6rem;
      color: var(--muted);
      letter-spacing: .15em;
      min-width: 52px;
      text-align: right
    }

    /* STAGE */
    #stage {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center
    }

    #slides {
      position: relative;
      width: 100%;
      height: 100%
    }

    /* SLIDE */
    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity .8s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 52px 72px;
    }

    .slide.active {
      opacity: 1;
      pointer-events: all
    }

    /* CARD — layout: foto izq, info der */
    .card {
      display: flex;
      align-items: center;
      gap: 72px;
      width: 100%;
      max-width: 1100px;
      transform: translateY(16px);
      transition: transform .8s cubic-bezier(.22, 1, .36, 1);
    }

    .slide.active .card {
      transform: translateY(0)
    }

    /* FOTO CIRCULAR */
    .photo-col {
      flex-shrink: 0;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .circle-outer {
      width: 320px;
      height: 320px;
      border-radius: 50%;
      border: 2px solid rgba(201, 168, 76, .45);
      padding: 6px;
      position: relative;
      box-shadow: 0 0 0 1px rgba(201, 168, 76, .12), 0 0 60px rgba(201, 168, 76, .1);
      animation: glow 4s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from {
        box-shadow: 0 0 0 1px rgba(201, 168, 76, .12), 0 0 40px rgba(201, 168, 76, .08)
      }

      to {
        box-shadow: 0 0 0 1px rgba(201, 168, 76, .2), 0 0 70px rgba(201, 168, 76, .18)
      }
    }

    .circle-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid rgba(201, 168, 76, .2);
    }

    .circle-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block
    }

    /* Punto decorativo en el ring */
    .ring-dot {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--gold);
      top: -3px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 12px var(--gold);
    }

    /* INFO */
    .info-col {
      flex: 1;
      min-width: 0
    }

    .line-top {
      width: 56px;
      height: 1px;
      background: linear-gradient(90deg, var(--gold), transparent);
      margin-bottom: 24px
    }

      font-weight: 500;
      letter-spacing: .3em;

      border: 1px solid rgba(201, 168, 76, .4);

      font-weight: 400;

    .instagram {

    .ig-at {

    .line-bot {

    /* Particles */
    .particle {
      position: fixed;
      border-radius: 50%;
      background: rgba(201, 168, 76, 0.12);
      pointer-events: none;
      z-index: 1;

    }

    @keyframes floatUp {
      0% {

      10% {
        opacity: 1
      }

      90% {
        opacity: .3
      }

      100% {
        transform: translateY(-10vh);
        opacity: 0
      }

      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 100px 52px 72px
    }

    .agenda-wrap {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 1100px;
      height: 100%
    }

      font-size: .62rem;
      letter-spacing: .38em;
      text-transform: uppercase;
      color: rgba(201, 168, 76, .75);
      margin-bottom: 10px
    }

    .agenda-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.8rem;
      font-weight: 600;

    .agenda-ticker-outer {
      flex: 1;
      overflow: hidden;
      position: relative
    }

    .agenda-ticker-outer::before,

      content: '';
      position: absolute;
      left: 0;
      right: 0;
      height: 72px;
      z-index: 2;
      pointer-events: none
    }

    .agenda-inner {

      font-family: 'Cormorant Garamond', serif;
      font-size: 1.18rem;
      color: rgba(255, 255, 255, .75);
      line-height: 1.4
    }
  </style>
</head>

      <h2 class="doctor-name">${d.name.replace(' ', '<br>')}</h2>
      <p class="specialty">${d.specialty}</p>
      <div class="country-row">${flagSrc ? `<img class="flag-img" src="${flagSrc}" alt="${d.country}"/>` : ''}
        <span class="country-name">${d.country}</span></div>
      ${d.talk ? `<p class="talk">${d.talk}</p>` : ''}
      ${d.ig ? `<p class="instagram"><span class="ig-at">@</span>${d.ig}</p>` : ''}
      <div class="line-bot"></div>
    </div></div>`;

  <div class="agenda-ticker-outer"><div class="agTicker"><div class="agenda-inner">${rows2}${rows2}</div></div></div>
</div>`;
    slidesEl.appendChild(agDiv2);

    const slides = document.querySelectorAll('.slide');
    const TOTAL = slides.length;
    counter.textContent = '1 / ' + TOTAL;

    // Particles
    const pEl = document.getElementById('particles');
    for (let i = 0; i < 22; i++) {
      const p = document.createElement('div'); p.className = 'particle';
      const s = Math.random() * 55 + 10;
      p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random() * 100}%;animation-duration:${Math.random() * 18 + 10}s;animation-delay:${Math.random() * -25}s`;
      pEl.appendChild(p);
    }

    // Agenda ticker
    let agPos = 0, agRaf = null, agRunning = false;
    function runTicker() {
      if (agRunning) return; agRunning = true;
      const inner = document.querySelector('.slide.active .agenda-inner');
      if (!inner) return;
      const half = inner.scrollHeight / 2;
      (function tick() { agRaf = requestAnimationFrame(tick); agPos += 0.5; if (agPos >= half) agPos = 0; inner.style.transform = `translateY(-${agPos}px)` })();
    }
    function stopTicker() { agRunning = false; cancelAnimationFrame(agRaf); agPos = 0; }

    function animateProg(dur, cb) {
      cancelAnimationFrame(rafId); startTime = performance.now();
      bar.style.transition = 'none'; bar.style.width = '0%';
      requestAnimationFrame(() => requestAnimationFrame(function t(now) {
        const p = Math.min(((now - startTime) / dur) * 100, 100);
        bar.style.width = p + '%';
        if (p < 100) rafId = requestAnimationFrame(t); else setTimeout(cb, 50);
      }));
    }

    function showSlide(idx) {
      slides[current].classList.remove('active');
      current = ((idx % TOTAL) + TOTAL) % TOTAL;
      slides[current].classList.add('active');
      counter.textContent = (current + 1) + ' / ' + TOTAL;
      if (slides[current].classList.contains('agenda-slide')) {
        runTicker(); animateProg(20000, () => showSlide(current + 1));
      } else {
        stopTicker(); animateProg(DURATION, () => showSlide(current + 1));
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === ' ') { cancelAnimationFrame(rafId); showSlide(current + 1); }
      if (e.key === 'ArrowLeft') { cancelAnimationFrame(rafId); showSlide(current - 1); }
      if (e.key === 'f' || e.key === 'F') document.documentElement.requestFullscreen?.();
    });
